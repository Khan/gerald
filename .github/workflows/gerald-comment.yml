name: Gerald - Check Comments
'on':
  issue_comment
jobs:
  gerald:
    runs-on: ubuntu-latest
    steps:
      - name: Run Gerald
        uses: Khan/gerald@c9b7069b0a50067c069c90447e92f47c7a1c8334 # main
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          ADMIN_PERMISSION_TOKEN: '${{ secrets.KHAN_ACTIONS_BOT_TOKEN }}'
          EVENT: 'issue_comment'
