name: Build index.js
'on':
  push:
    branches:
      - main
      - debug
  pull_request:
    branches:
      - main
jobs:
  build_index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js, install deps
        uses: ./.github/actions/setup

      - name: Build dist folder
        run: pnpm run build

      - name: Commit files
        run: |
          echo ${{ github.ref }}
          git add .
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Automated build push" -a | exit 0

      - name: Push changes
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/debug'
        uses: ad-m/github-push-action@4cc74773234f74829a8c21bc4d69dd4be9cfa599 # master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
